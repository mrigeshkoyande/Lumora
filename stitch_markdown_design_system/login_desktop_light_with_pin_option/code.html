<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Arogya OS - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>

        tailwind.config = {

              "colors": {

                      "primary-fixed": "#cbe6ff",
                      "tertiary-container": "#7ab6b8",
                      "inverse-primary": "#8ecdff",
                      "error-container": "#ffdad6",
                      "on-surface": "#111e1f",
                      "on-primary-fixed-variant": "#004b71",
                      "on-primary": "#ffffff",
                      "inverse-surface": "#263334",
                      "surface-container-lowest": "#ffffff",
                      "on-tertiary-container": "#00484a",
                      "on-secondary": "#ffffff",
                      "surface-dim": "#cfddde",
                      "surface": "#eefcfd",
                      "surface-container-low": "#e8f6f7",
                      "on-tertiary-fixed-variant": "#034f51",
                      "primary-fixed-dim": "#8ecdff",
                      "surface-variant": "#d7e5e6",
                      "surface-container-high": "#ddebec",
                      "tertiary": "#286769",
                      "on-error-container": "#93000a",
                      "background": "#eefcfd",
                      "outline": "#6f7882",

                      "on-secondary-fixed-variant": "#004f53",
                      "error": "#ba1a1a",
                      "on-error": "#ffffff",

                      "on-background": "#111e1f",

              },
              "borderRadius": {
                      "DEFAULT": "1rem",

              },
              "spacing": {
                      "unit": "4px",
                      "container-max": "1280px",
                      "margin-mobile": "16px",
                      "gutter": "24px",
                      "margin-desktop": "64px"
              },
              "fontFamily": {
                      "headline-lg": ["Inter"],
                      "display-lg": ["Inter"],
                      "label-sm": ["Inter"],
                      "headline-lg-mobile": ["Inter"],
                      "body-md": ["Inter"]
              },
              "fontSize": {

          }

<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(0, 30, 48, 0.05);
        }
        
        .glass-input {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
        }
        
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.8);
            border-color: #006494;
            box-shadow: 0 0 0 2px rgba(0, 100, 148, 0.2);
            outline: none;
        }

        .blob-1 {
            animation: float 20s infinite ease-in-out alternate;
        }
        .blob-2 {
            animation: float-reverse 25s infinite ease-in-out alternate;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 30px) scale(1.1); }
        }
        @keyframes float-reverse {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-40px, -50px) scale(0.9); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-surface to-surface-container-high min-h-screen w-full flex flex-col items-center justify-center relative overflow-hidden font-body-md text-on-surface antialiased">
<!-- Ambient Background Blobs -->
<div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-primary/10 blur-[100px] blob-1 pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] rounded-full bg-secondary/15 blur-[120px] blob-2 pointer-events-none"></div>
<!-- Main Content Container -->
<main class="w-full max-w-[420px] px-margin-mobile md:px-0 z-10 flex flex-col items-center">
<!-- Glass Card -->
<div class="glass-card w-full rounded-[20px] p-8 flex flex-col relative overflow-hidden">
<!-- Language Selector Pill -->
<div class="absolute top-6 right-6 z-10">
<button class="flex items-center gap-1 px-3 py-1.5 rounded-full bg-white/50 hover:bg-white/70 border border-white/80 transition-colors text-on-surface-variant font-label-sm text-label-sm shadow-sm backdrop-blur-md">
<span class="material-symbols-outlined text-[16px]">language</span>
<span>EN</span>
<span class="material-symbols-outlined text-[16px]">expand_more</span>
</button>
</div>
<!-- Header -->
<div class="mb-10 mt-2">
<h1 class="font-headline-lg text-headline-lg text-primary font-bold tracking-tight">Arogya OS</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Sign in to access your administrative workspace.</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-5 w-full">
<!-- Email Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label-sm text-label-sm text-on-surface" for="email">Email Address</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-outline">
<span class="material-symbols-outlined text-[20px]">mail</span>
</span>
<input class="glass-input w-full h-12 rounded-DEFAULT pl-10 pr-4 font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="email" placeholder="practitioner@arogya.gov.in" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label-sm text-label-sm text-on-surface" for="password">Password</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-outline">
<span class="material-symbols-outlined text-[20px]">lock</span>
</span>
<input class="glass-input w-full h-12 rounded-DEFAULT pl-10 pr-10 font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-3 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
<div class="flex justify-end mt-1">
<a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
</div>
<!-- Actions -->
<div class="mt-4 flex flex-col gap-4"><button class="w-full h-12 rounded-DEFAULT bg-primary hover:bg-on-primary-fixed-variant text-on-primary font-label-sm text-label-sm font-semibold transition-all shadow-md shadow-primary/20 hover:shadow-lg hover:shadow-primary/30 active:scale-[0.98] flex items-center justify-center gap-2" type="submit"><span>Sign In</span><span class="material-symbols-outlined text-[18px]">arrow_forward</span></button><div class="relative flex items-center py-2"><div class="flex-grow border-t border-outline-variant/30"></div><span class="flex-shrink-0 mx-4 text-on-surface-variant font-label-sm text-label-sm">OR</span><div class="flex-grow border-t border-outline-variant/30"></div></div><button class="w-full flex items-center justify-center h-12 rounded-DEFAULT bg-white/40 hover:bg-white/60 border border-primary/20 text-primary font-label-sm text-label-sm font-semibold transition-all backdrop-blur-md" onclick="const card = this.closest('.glass-card'); card.querySelector('form').classList.add('hidden'); card.querySelector('.mb-10').classList.add('hidden'); card.querySelector('.pin-pad-container').classList.remove('hidden');" type="button">Sign in with PIN</button></div>
</form>
<div class="pin-pad-container hidden flex flex-col gap-6 mt-2"><div class="text-center"><h2 class="font-headline-lg text-[24px] text-primary font-bold">Enter PIN</h2><p class="font-body-md text-label-sm text-on-surface-variant mt-1">Enter your 6-digit security PIN</p></div><div class="flex justify-center gap-3 my-4"><div class="w-3 h-3 rounded-full border border-primary/30"></div><div class="w-3 h-3 rounded-full border border-primary/30"></div><div class="w-3 h-3 rounded-full border border-primary/30"></div><div class="w-3 h-3 rounded-full border border-primary/30"></div><div class="w-3 h-3 rounded-full border border-primary/30"></div><div class="w-3 h-3 rounded-full border border-primary/30"></div></div><div class="grid grid-cols-3 gap-4 px-4"> <button class="h-14 rounded-full bg-white/40 hover:bg-white/60 text-on-surface font-semibold text-[20px] transition-all">1</button> <button class="h-14 rounded-full bg-white/40 hover:bg-white/60 text-on-surface font-semibold text-[20px] transition-all">2</button> <button class="h-14 rounded-full bg-white/40 hover:bg-white/60 text-on-surface font-semibold text-[20px] transition-all">3</button> <button class="h-14 rounded-full bg-white/40 hover:bg-white/60 text-on-surface font-semibold text-[20px] transition-all">4</button> <button class="h-14 rounded-full bg-white/40 hover:bg-white/60 text-on-surface font-semibold text-[20px] transition-all">5</button> <button class="h-14 rounded-full bg-white/40 hover:bg-white/60 text-on-surface font-semibold text-[20px] transition-all">6</button> <button class="h-14 rounded-full bg-white/40 hover:bg-white/60 text-on-surface font-semibold text-[20px] transition-all">7</button> <button class="h-14 rounded-full bg-white/40 hover:bg-white/60 text-on-surface font-semibold text-[20px] transition-all">8</button> <button class="h-14 rounded-full bg-white/40 hover:bg-white/60 text-on-surface font-semibold text-[20px] transition-all">9</button> <button class="h-14 flex items-center justify-center text-outline hover:text-primary transition-colors"><span class="material-symbols-outlined">backspace</span></button> <button class="h-14 rounded-full bg-white/40 hover:bg-white/60 text-on-surface font-semibold text-[20px] transition-all">0</button> <button class="h-14 flex items-center justify-center text-primary hover:text-primary-container transition-colors"><span class="material-symbols-outlined">check_circle</span></button> </div><button class="mt-4 text-primary font-label-sm text-label-sm hover:underline" onclick="const card = this.closest('.glass-card'); card.querySelector('form').classList.remove('hidden'); card.querySelector('.mb-10').classList.remove('hidden'); card.querySelector('.pin-pad-container').classList.add('hidden');">Back to Email Login</button></div></div>
<!-- Footer -->
<footer class="mt-8 text-center">
<p class="font-label-sm text-label-sm text-outline">Ministry of Health &amp; Family Welfare</p>
</footer>
</main>
</body></html>
