<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Arogya OS - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline-variant": "#bec8d2",
                        "on-primary-container": "#004466",
                        "surface-container-highest": "#d7e5e6",
                        "surface-bright": "#eefcfd",
                        "on-secondary-fixed": "#002022",
                        "surface-container": "#e3f1f2",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#006494",
                        "secondary": "#00696e",
                        "on-secondary-container": "#006e73",
                        "secondary-fixed": "#83f4fc",
                        "on-primary-fixed": "#001e30",
                        "secondary-fixed-dim": "#64d7df",
                        "on-tertiary-fixed": "#002021",
                        "inverse-on-surface": "#e5f3f4",
                        "primary-container": "#3ab5ff",
                        "primary-fixed": "#cbe6ff",
                        "tertiary-container": "#7ab6b8",
                        "inverse-primary": "#8ecdff",
                        "error-container": "#ffdad6",
                        "on-surface": "#111e1f",
                        "on-primary-fixed-variant": "#004b71",
                        "on-primary": "#ffffff",
                        "inverse-surface": "#263334",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#00484a",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#cfddde",
                        "surface": "#eefcfd",
                        "surface-container-low": "#e8f6f7",
                        "on-tertiary-fixed-variant": "#034f51",
                        "primary-fixed-dim": "#8ecdff",
                        "surface-variant": "#d7e5e6",
                        "surface-container-high": "#ddebec",
                        "tertiary": "#286769",
                        "on-error-container": "#93000a",
                        "background": "#eefcfd",
                        "outline": "#6f7882",
                        "primary": "#006494",
                        "on-secondary-fixed-variant": "#004f53",
                        "error": "#ba1a1a",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#b0edef",
                        "on-background": "#111e1f",
                        "on-surface-variant": "#3e4851",
                        "tertiary-fixed-dim": "#94d1d3",
                        "secondary-container": "#80f1f9"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",

                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "4px",
                        "container-max": "1280px",
                        "margin-mobile": "16px",
                        "gutter": "24px",
                        "margin-desktop": "64px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],
                        "display-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "display-lg": ["56px", {"lineHeight": "64px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                }
            }
        }

<style>
        body {
            /* Simulating the fluid glassmorphism background for mobile */
            background: linear-gradient(135deg, theme('colors.surface-bright') 0%, theme('colors.surface-container') 100%);
            position: relative;
            overflow: hidden;
            min-height: 100vh;
        }

        /* Abstract ambient orbs for depth */
        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            z-index: 0;
            animation: float 20s infinite ease-in-out alternate;
        }
        .orb-1 {
            width: 300px;
            height: 300px;
            background: theme('colors.primary-fixed');
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 250px;
            height: 250px;
            background: theme('colors.secondary-fixed');
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }
        .orb-3 {
            width: 200px;
            height: 200px;
            background: theme('colors.tertiary-fixed');
            top: 40%;
            left: 60%;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -40px) scale(1.1); }
            100% { transform: translate(-20px, 50px) scale(0.9); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(0, 100, 148, 0.05);
            position: relative;
            z-index: 10;
        }
        
        .glass-input {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: theme('colors.primary');
            box-shadow: 0 0 0 2px theme('colors.primary-fixed');
            outline: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-body-md text-on-surface antialiased flex flex-col items-center justify-center p-margin-mobile h-screen max-w-[390px] mx-auto relative w-full">
<!-- Ambient Background Elements -->
<div class="ambient-orb orb-1"></div>
<div class="ambient-orb orb-2"></div>
<div class="ambient-orb orb-3"></div>
<!-- Login Container -->
<main class="w-full max-w-[358px] glass-card rounded-xl p-6 flex flex-col gap-6">
<!-- Header: Brand & Language -->
<div class="flex justify-between items-center w-full">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary font-black tracking-tight">
                Arogya OS
            </h1>
<button class="flex items-center gap-1 px-3 py-1.5 rounded-full bg-white/40 border border-white/60 text-on-surface-variant font-label-sm text-label-sm hover:bg-white/60 transition-colors">
<span class="material-symbols-outlined" style="font-size: 16px;">language</span>
                EN
                <span class="material-symbols-outlined" style="font-size: 16px;">arrow_drop_down</span>
</button>
</div>
<div class="flex flex-col gap-2">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Please sign in to access the portal.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-5 w-full" onsubmit="event.preventDefault();"><div class="flex flex-col gap-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1">Enter 6-digit Verification Code</label>
<div class="flex justify-between gap-2">
<input class="glass-input w-12 h-14 rounded-lg text-center font-headline-lg-mobile text-headline-lg-mobile text-on-surface focus:ring-2 focus:ring-primary" maxlength="1" placeholder="0" type="text"/>
<input class="glass-input w-12 h-14 rounded-lg text-center font-headline-lg-mobile text-headline-lg-mobile text-on-surface focus:ring-2 focus:ring-primary" maxlength="1" placeholder="0" type="text"/>
<input class="glass-input w-12 h-14 rounded-lg text-center font-headline-lg-mobile text-headline-lg-mobile text-on-surface focus:ring-2 focus:ring-primary" maxlength="1" placeholder="0" type="text"/>
<input class="glass-input w-12 h-14 rounded-lg text-center font-headline-lg-mobile text-headline-lg-mobile text-on-surface focus:ring-2 focus:ring-primary" maxlength="1" placeholder="0" type="text"/>
<input class="glass-input w-12 h-14 rounded-lg text-center font-headline-lg-mobile text-headline-lg-mobile text-on-surface focus:ring-2 focus:ring-primary" maxlength="1" placeholder="0" type="text"/>
<input class="glass-input w-12 h-14 rounded-lg text-center font-headline-lg-mobile text-headline-lg-mobile text-on-surface focus:ring-2 focus:ring-primary" maxlength="1" placeholder="0" type="text"/>
</div>
<p class="text-label-sm text-outline text-center mt-2">Didn't receive a code? <a class="text-primary hover:underline" href="#">Resend</a></p>
</div>
<button class="w-full bg-primary hover:bg-on-primary-fixed-variant text-on-primary font-label-sm text-label-sm py-3.5 rounded-lg transition-colors shadow-sm shadow-primary/20 mt-2" type="submit">
        Verify &amp; Sign In
    </button>
<button class="text-label-sm text-primary font-label-sm hover:underline text-center" type="button">Back to Login</button>
</div></form>
<!-- Secondary Action -->
<div class="w-full pt-4 border-t border-white/30 flex flex-col items-center gap-4">
<button class="w-full flex items-center justify-center gap-2 py-3 rounded-lg border border-primary text-primary font-label-sm text-label-sm hover:bg-primary/5 transition-colors bg-white/20 backdrop-blur-md">
<span class="material-symbols-outlined" style="font-size: 18px;">dialpad</span>
                Sign in with PIN
            </button>
<p class="font-label-sm text-label-sm text-on-surface-variant text-center opacity-70">
                Secured by Arogya Health Protocol
            </p>
</div>
</main>
</body></html>
